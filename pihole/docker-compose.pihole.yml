networks:
  pihole-net:
    driver: bridge

services:
  pihole:
    container_name: pihole
    image: pihole/pihole:latest
    cap_add:
      - NET_ADMIN
      - SYS_NICE
    environment:
      - PIHOLE_UID=${PUID}
      - PIHOLE_GID=${PGID}
      - TZ=${TZ}
      - FTLCONF_webserver_api_password=${PIHOLE_FTLCONF_webserver_api_password}
      - FTLCONF_dns_upstreams=${PIHOLE_FTLCONF_dns_upstreams}
      - FTLCONF_dns_revServers=${PIHOLE_FTLCONF_dns_revServers}
      - FTLCONF_dns_listeningMode=all
    volumes:
      - ${APPDATA}/pihole:/etc/pihole
    ports:
      - 53:53/tcp
      - 53:53/udp
      - 67:67/udp
      - ${PIHOLE_HTTP_PORT}:80/tcp
      - ${PIHOLE_HTTPS_PORT}:443/tcp
    restart: unless-stopped
    networks:
      - pihole-net
    labels:
      net.unraid.docker.webui: "https://[IP]:[PORT:${PIHOLE_HTTPS_PORT}]/admin"
      net.unraid.docker.icon: "https://wp-cdn.pi-hole.net/wp-content/uploads/2016/12/Vortex-R.png"
      net.unraid.docker.shell: "sh"
