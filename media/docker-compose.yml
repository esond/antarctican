services:
  qbittorrent:
    image: linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - WEBUI_PORT=${QBITTORRENT_WEBUI_PORT}
      - TORRENTING_PORT=${QBITTORRENT_TORRENTING_PORT}
    volumes:
      - ${APPDATA}/qbittorrent:/config
      - ${DATA}/torrents:/data/torrents
    ports:
      - "${QBITTORRENT_WEBUI_PORT}:${QBITTORRENT_WEBUI_PORT}"
      - "${QBITTORRENT_TORRENTING_PORT}:${QBITTORRENT_TORRENTING_PORT}"
      - "${QBITTORRENT_TORRENTING_PORT}:${QBITTORRENT_TORRENTING_PORT}/udp"
    restart: unless-stopped
    networks:
      - media-net

  sonarr:
    image: linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${APPDATA}/sonarr:/config
      - ${DATA}:/data
    ports:
      - 8989:8989
    restart: unless-stopped
    networks:
      - media-net

  radarr:
    image: linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${APPDATA}/radarr:/config
      - ${DATA}:/data
    ports:
      - 7878:7878
    restart: unless-stopped
    networks:
      - media-net

  # plex:
  #   image: plexinc/pms-docker:latest
  #   container_name: plex
  #   environment:
  #     - PUID=${PUID}
  #     - PGID=${PGID}
  #     - VERSION=${PLEX_VERSION}
  #     - TZ=${TZ}
  #   volumes:
  #     - ${APPDATA}/plex:/config
  #     - /tmp:/transcode
  #     - ${DATA}/media:/data/media
  #   ports:
  #     - 32400:32400
  #   restart: unless-stopped
  #   networks:
  #     - media-net

  jackett:
    image: linuxserver/jackett:latest
    container_name: jackett
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - AUTO_UPDATE=${JACKETT_AUTO_UPDATE}
    volumes:
      - ${APPDATA}/jackett:/config
    ports:
      - 9117:9117
    restart: unless-stopped
    networks:
      - media-net

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      - LOG_LEVEL=${FLARESOLVERR_LOG_LEVEL}
      - TZ=${TZ}
    ports:
      - 8191:8191
    restart: unless-stopped
    networks:
      - media-net

  notifiarr:
    container_name: notifiarr
    image: golift/notifiarr:latest
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${APPDATA}/notifiarr:/config
      - /var/run/utmp:/var/run/utmp
      - /etc/machine-id:/etc/machine-id
    ports:
      - 5454:5454
    restart: unless-stopped
    networks:
      - media-net

networks:
  media-net:
    driver: bridge
