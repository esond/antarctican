networks:
  media-net:
    driver: bridge

services:
  qbittorrentvpn:
    image: binhex/arch-qbittorrentvpn:latest
    container_name: qbittorrentvpn
    privileged: true
    sysctls:
      net.ipv4.conf.all.src_valid_mark: 1
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - WEBUI_PORT=${QBITTORRENT_WEBUI_PORT}
      - VPN_ENABLED=yes
      - VPN_USER=${QBITTORRENT_VPN_USER}
      - VPN_PASS=${QBITTORRENT_VPN_PASS}
      - VPN_ENABLED=yes
      - VPN_PROV=protonvpn
      - VPN_CLIENT=wireguard
      - ENABLE_PRIVOXY=no
      - ENABLE_SOCKS=no
      - STRICT_PORT_FORWARD=yes
      - LAN_NETWORK=192.168.1.0/24
      - UMASK=000
    volumes:
      - ${APPDATA}/qbittorrentvpn:/config
      - ${DATA}/torrents:/data/torrents
      - /etc/localtime:/etc/localtime:ro
    ports:
      - ${QBITTORRENT_WEBUI_PORT}:${QBITTORRENT_WEBUI_PORT}
      - ${QBITTORRENT_TORRENTING_PORT}:${QBITTORRENT_TORRENTING_PORT}
      - ${QBITTORRENT_TORRENTING_PORT}:${QBITTORRENT_TORRENTING_PORT}/udp
      - 8118:8118
      - 9118:9118
    restart: unless-stopped
    networks:
      - media-net
      
  flaresolverr:
    image: 21hsmw/flaresolverr:nodriver
    container_name: flaresolverr
    environment:
      - LOG_LEVEL=${FLARESOLVERR_LOG_LEVEL}
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    ports:
      - ${FLARESOLVERR_HOST_PORT}:8191
    restart: unless-stopped
    networks:
      - media-net

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    depends_on:
      - flaresolverr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${APPDATA}/prowlarr:/config
    ports:
      - ${PROWLARR_HOST_PORT}:9696
    restart: unless-stopped
    networks:
      - media-net
      
  sonarr-uhd:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr-uhd
    depends_on:
      - qbittorrentvpn
      - prowlarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${APPDATA}/sonarr-uhd:/config
      - ${DATA}:/data
    ports:
      - ${SONARR_UHD_HOST_PORT}:8989
    restart: unless-stopped
    networks:
      - media-net

  radarr-uhd:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr-uhd
    depends_on:
      - qbittorrentvpn
      - prowlarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${APPDATA}/radarr-uhd:/config
      - ${DATA}:/data
    ports:
      - ${RADARR_UHD_HOST_PORT}:7878
    restart: unless-stopped
    networks:
      - media-net

  notifiarr:
    image: golift/notifiarr:latest
    container_name: notifiarr
    hostname: ${NOTIFIARR_HOSTNAME}
    depends_on:
      - sonarr-uhd
      - radarr-uhd
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${APPDATA}/notifiarr:/config
      - /var/run/utmp:/var/run/utmp
      - /etc/machine-id:/etc/machine-id
    restart: unless-stopped
    ports:
      - ${NOTIFIARR_HOST_PORT}:5454
    networks:
      - media-net

  swag:
    image: lscr.io/linuxserver/swag:latest
    container_name: swag
    cap_add:
      - NET_ADMIN
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - URL=antarctican.tv
      - VALIDATION=dns
      - SUBDOMAINS=wildcard
      - DNSPLUGIN=${SWAG_DNSPLUGIN}
      - EMAIL=${SWAG_EMAIL}
      - ONLY_SUBDOMAINS=${SWAG_ONLY_SUBDOMAINS}
      - SWAG_AUTORELOAD=${SWAG_AUTORELOAD}
    volumes:
      - ${APPDATA}/swag:/config
    ports:
      - 443:443
      - 80:80
    restart: unless-stopped
    networks:
      - media-net

  overseerr:
    image: lscr.io/linuxserver/overseerr:latest
    container_name: overseerr
    depends_on:
      - swag
    environment:
      - LOG_LEVEL=${OVERSEERR_LOG_LEVEL}
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${APPDATA}/overseerr:/config
    ports:
      - ${OVERSEERR_HOST_PORT}:5055
    restart: unless-stopped
    networks:
      - media-net

  unpackerr:
    image: golift/unpackerr:latest
    container_name: unpackerr
    user: ${PUID}:${PGID}
    environment:
      - TZ=${TZ}
      - PUID=${PUID}
      - PGID=${PGID}
      - UN_LOG_FILE=${UNPACKERR_LOG_FILE_PATH}
      - UN_SONARR_0_URL=${UNPACKERR_SONARR_UHD_URL}
      - UN_SONARR_0_API_KEY=${UNPACKERR_SONARR_UHD_API_KEY}
      - UN_RADARR_0_URL=${UNPACKERR_RADARR_UHD_URL}
      - UN_RADARR_0_API_KEY=${UNPACKERR_RADARR_UHD_API_KEY}
    volumes:
      - ${APPDATA}/unpackerr:/config
      - ${DATA}/torrents:/data/torrents
    restart: unless-stopped
    networks:
      - media-net